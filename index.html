<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap"
      rel="stylesheet"
    />
    <title>Cat Tower</title>
  </head>
  <body>
    <div id="app" class="app--menu">
      <canvas id="game-canvas" tabindex="-1" aria-label="Game" inert></canvas>
      <div id="hud">
        <div id="hint-bar" class="hint-bar">
          <span>Tap or press Space to drop a cat. Stack high!</span>
          <button type="button" id="hint-dismiss" class="hint-dismiss" aria-label="Dismiss hint">
            ×
          </button>
        </div>
        <div class="hud-top">
          <div class="score-pill">
            <span class="star" aria-hidden="true">★</span>
            <span id="hud-score">0</span>
          </div>
          <div class="best-pill">Best <span id="hud-best">0</span></div>
          <div class="hud-actions">
            <button
              type="button"
              id="btn-mute"
              class="icon-btn btn-mute"
              aria-label="Toggle sound"
              aria-pressed="false"
            >
              🔊
            </button>
            <button type="button" id="btn-pause" class="icon-btn" aria-label="Pause">
              <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
                <rect x="3" y="2" width="4" height="14" rx="1" fill="currentColor" />
                <rect x="11" y="2" width="4" height="14" rx="1" fill="currentColor" />
              </svg>
            </button>
          </div>
        </div>
        <div id="score-toast" class="score-toast" hidden aria-live="polite"></div>
      </div>
      <div
        id="pause-overlay"
        class="overlay overlay-enter"
        hidden
        aria-hidden="true"
      >
        <div class="panel">
          <h2>Paused</h2>
          <button type="button" id="btn-resume" class="panel-btn primary">Resume</button>
          <button type="button" id="btn-pause-restart" class="panel-btn secondary">
            Restart run
          </button>
          <button type="button" id="btn-pause-mainmenu" class="panel-btn secondary">
            Main menu
          </button>
          <p class="hint">Escape to resume</p>
        </div>
      </div>
      <div id="gameover" class="overlay overlay-enter" hidden aria-hidden="true">
        <div class="panel gameover-panel">
          <div class="hazard-strip" aria-hidden="true"></div>
          <h2>Game over</h2>
          <p id="go-newbest" class="new-best" hidden>New best!</p>
          <p class="go-line">Score <span id="go-score">0</span></p>
          <p class="go-line">Best <span id="go-best">0</span></p>
          <button type="button" id="go-restart" class="panel-btn primary">Play again</button>
        </div>
      </div>
      <div
        id="main-menu"
        class="main-menu"
        role="dialog"
        aria-modal="true"
        aria-labelledby="main-menu-title"
      >
        <div class="main-menu__hero">
          <img
            class="main-menu__img"
            src="/menu-hero.svg"
            width="800"
            height="400"
            alt=""
            decoding="async"
          />
        </div>
        <div class="main-menu__content">
          <h1 id="main-menu-title" class="main-menu__title">Cat Tower</h1>
          <p class="main-menu__tagline">Stack cats. Beat your best.</p>
          <p class="main-menu__best">Best <span id="menu-best">0</span></p>
          <button type="button" id="btn-play" class="panel-btn primary main-menu__play">Play</button>
          <button
            type="button"
            id="btn-menu-mute"
            class="icon-btn btn-mute main-menu__mute"
            aria-label="Toggle sound"
            aria-pressed="false"
          >
            🔊
          </button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
